<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>

    <link
         rel="icon"
         href="./assets/icons/desktop/logoFavicon.svg"
         type="image/svg+xml"
         media="(prefers-color-scheme: light)" />
      <link
         rel="icon"
         href="./assets/icons/desktop/logo.svg"
         type="image/svg+xml"
         media="(prefers-color-scheme: dark)" />

    <script src="./scripts/template.js"></script>
    <script src="./scripts/index.js"></script>
    <script src="./script.js"></script>
    
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="splash__logo">
        <img src="./assets/icons/desktop/logoWithoutBg.svg" alt="Join Logo" class="splash__logo--image">
    </div>
    <div id="main-content" class="main-content hidden">
        <header>
            <div class="header__flex-instructions">
                <div class="login__signup">
                    <p class="login__signup--question">Not a Join User?</p>
                    <button id="signup-button" class="login__button button">Sign Up</button>
                </div>
            </div>
        </header>
        <main>
            <div class="login__window">
                <div class="login__headline">
                    <h1 class="login__header">Log in</h1>
                    <img src="./assets/icons/desktop/login__dividingLine.svg" alt="Dividing Line" class="login__headline--line">
                </div>
                <form action="#" class="login__formular">
                    <input type="text" class="login__input login__input--email">
                    <input type="password" class="login__input login__input--password">
                </form>
            </div>
        </main>
        <footer>
            <div class="content_max-width footer_flex-instructions"></div>
        </footer>
    </div>
</body>
</html>
